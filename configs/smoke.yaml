# Smoke test: ~3 epochs on tiny dataset; verifies pipeline plumbing (HMSC on).
# use_hmsc=true to exercise the full Phase 1 path.

experiment:
  name: training_pipeline_smoke
  phase: 1
  seed: 42

model:
  d_model: 64
  num_heads: 4
  H_cycles: 1
  L_cycles: 1
  H_layers: 1
  L_layers: 1
  use_hmsc: true
  hmsc:
    K_G: 8
    K_R: 4
    K_P: 4
    d_G: 64
    d_R: 32
    d_P: 16
    num_regions: 4
    composition_method: sum
    p_discreteness: soft
    num_workflow_types: 50
    num_pattern_types: 12
    num_primitives: 10
  vocab_size: 10
  max_nodes: 64
  halt_max_steps: 2
  halt_exploration_prob: 0.0
  forward_dtype: "float32"

training:
  batch_size: 8
  max_epochs: 3
  eval_interval_epochs: 1
  learning_rate: 1.0e-4
  warmup_steps: 5
  weight_decay: 0.01
  grad_clip_norm: 1.0
  mixed_precision: float32
  lambda_G: 0.1
  lambda_R: 0.1
  lambda_P: 0.1
  main_loss_weight: 1.0
  halt_loss_weight: 0.1
  drop_last: false

data:
  dataset_root: /tmp/marifah_tiny_dataset
  num_workers: 0
  pin_memory: false

logging:
  wandb_mode: disabled
  wandb_project: marifah-core
  log_interval_steps: 5
  utilization_interval_steps: 10
  checkpoint_dir: /tmp/marifah_smoke_checkpoints/smoke_hmsc_on/
