# Phase 0: PC-only DAG training (the gating run)
# Produces workflow-type AUC verdict per codebook design §7.
# use_hmsc=False — HMSC disabled. Lambdas all 0.

experiment:
  name: phase0_pc_only
  phase: 0
  seed: 42

model:
  d_model: 512
  num_heads: 8
  H_cycles: 1
  L_cycles: 1
  H_layers: 2
  L_layers: 2
  use_hmsc: false
  hmsc: null
  vocab_size: 10
  max_nodes: 100
  halt_max_steps: 4
  halt_exploration_prob: 0.1
  forward_dtype: "float32"

training:
  batch_size: 64
  max_epochs: 100
  eval_interval_epochs: 5
  learning_rate: 1.0e-4
  warmup_steps: 1000
  weight_decay: 0.01
  grad_clip_norm: 1.0
  mixed_precision: bf16
  lambda_G: 0.0
  lambda_R: 0.0
  lambda_P: 0.0
  main_loss_weight: 1.0
  halt_loss_weight: 0.1

data:
  drop_last: true
  dataset_root: /tmp/marifah_full_dataset
  num_workers: 4
  pin_memory: true

logging:
  wandb_mode: online
  wandb_project: marifah-core
  log_interval_steps: 100
  utilization_interval_steps: 500
  checkpoint_dir: checkpoints/phase0/
